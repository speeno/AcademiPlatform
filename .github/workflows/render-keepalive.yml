name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check keepalive target
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          set -euo pipefail

          TARGET_URL="${KEEPALIVE_URL:-https://academiq-backend.onrender.com/api/health}"
          echo "Target: ${TARGET_URL}"

          start_ms=$(date +%s%3N)
          status=$(curl --location --silent --show-error --output /tmp/keepalive_response.txt \
            --write-out "%{http_code}" --max-time 20 "${TARGET_URL}")
          end_ms=$(date +%s%3N)
          latency_ms=$((end_ms - start_ms))

          echo "status=${status} latency_ms=${latency_ms}"
          head -c 300 /tmp/keepalive_response.txt || true
          echo ""

          if [ "${status}" -ne 200 ]; then
            echo "Keepalive failed with status ${status}"
            exit 1
          fi

