name: Render Keepalive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check keepalive target
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          set -euo pipefail

          TARGET_URL="${KEEPALIVE_URL:-https://academiplatform.onrender.com/api/health}"
          echo "Target: ${TARGET_URL}"
          max_attempts=4
          attempt=1
          success=0

          while [ "${attempt}" -le "${max_attempts}" ]; do
            start_ms=$(date +%s%3N)
            status_code=$(curl --location --silent --show-error --output /tmp/keepalive_response.txt \
              --write-out "%{http_code}" --max-time 90 "${TARGET_URL}" || true)
            end_ms=$(date +%s%3N)
            latency_ms=$((end_ms - start_ms))
            body_sample=$(head -c 500 /tmp/keepalive_response.txt || true)

            echo "attempt=${attempt}/${max_attempts} status=${status_code} latency_ms=${latency_ms}"
            echo "${body_sample}"
            echo ""

            db_ok=0
            if echo "${body_sample}" | grep -q '"db"[[:space:]]*:[[:space:]]*"ok"'; then
              db_ok=1
            fi

            if [ "${status_code}" = "200" ] && [ "${db_ok}" -eq 1 ]; then
              success=1
              break
            fi

            if [ "${status_code}" = "200" ] && [ "${db_ok}" -ne 1 ]; then
              echo "HTTP 200 but DB ping not ok — check dbLatencyMs in response"
            fi

            if echo "${body_sample}" | tr '[:upper:]' '[:lower:]' | grep -q "suspended by its owner"; then
              echo "Render service is suspended-by-user. Unsuspend in Render dashboard first."
              exit 1
            fi

            sleep 20
            attempt=$((attempt + 1))
          done

          if [ "${success}" -ne 1 ]; then
            echo "Keepalive failed after ${max_attempts} attempts (need HTTP 200 and db:ok)"
            exit 1
          fi
